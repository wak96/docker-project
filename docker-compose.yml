version: '3.8'

services:
  web:
    build: ./Walid-Ayaan-Kawsar-main
    command: gunicorn --bind 0.0.0.0:8000 Portfolio.wsgi:application
    restart: always
    volumes:
      - ./Walid-Ayaan-Kawsar-main/static:/app/static
    expose:
      - "8000"
    depends_on:
      - db

  nginx:
    image: nginx:latest
    ports:
      - "9090:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - ./Walid-Ayaan-Kawsar-main/static:/app/static
    depends_on:
      - web
    restart: always   # ✅ Add this

  db:
    image: postgres:13
    environment:
      - POSTGRES_DB=mydb
      - POSTGRES_USER=myuser
      - POSTGRES_PASSWORD=mypassword
    restart: always   # ✅ Add this
